<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Online Jobfair</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/Shared.css" />
</head>
<body class="auth-layout">

<!-- LEFT PANEL -->
<div class="panel-left">
  <div class="brand">
    <span class="brand-dot"></span>
    <span class="brand-name">Online Jobfair</span>
  </div>
  <div class="left-content">
    <div class="event-label">Event Registration</div>
    <h1 class="left-title">Find your<br /><em>next great</em><br />opportunity.</h1>
    <div class="info-item">
      <div class="info-icon">📅</div>
      <div class="info-text"><strong>Date</strong>May 10 – 13, 2022</div>
    </div>
    <div class="info-item">
      <div class="info-icon">🌐</div>
      <div class="info-text"><strong>Format</strong>Online — Zoom / Live Stream</div>
    </div>
    <div class="info-item">
      <div class="info-icon">📋</div>
      <div class="info-text"><strong>Bookings</strong>Up to 3 companies per person</div>
    </div>
  </div>
  <div class="deco"></div>
</div>

<!-- RIGHT PANEL -->
<div class="panel-right">
  <div class="form-card">

    <div class="form-header">
      <h2>Welcome back</h2>
      <p>New here? <a href="register.html">Create an account</a></p>
    </div>

    <div class="error-box" id="errorBox"></div>

    <form id="loginForm" novalidate>
      <div class="field-group">

        <div class="field">
          <label for="email">Email <span class="req">*</span></label>
          <input type="email" id="email" placeholder="you@email.com" autocomplete="email" />
        </div>

        <div class="field">
          <label for="password">Password <span class="req">*</span></label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="Your password" autocomplete="current-password" />
            <button type="button" class="toggle-pw" onclick="togglePw()">
              <svg id="eyeIcon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

      </div>

      <button type="submit" class="btn" id="loginBtn">
        Sign In
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </form>

    <div class="bottom-link">Don't have an account? <a href="register.html">Register now</a></div>

  </div>
</div>

<script src="../scripts/Login.js"></script>
</body>
</html>
